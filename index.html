<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Serigrafia - Orçamentador V17.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --bg-blue: #005aab; --active-blue: #0078d7; --text-dark: #333; 
            --green-success: #27ae60; --red-delete: #e74c3c; --pdf-red: #c0392b; --sync-orange: #f39c12;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background-color: var(--bg-blue); color: white; min-height: 100vh; overflow-y: auto; padding-bottom: 220px; }
        .main-container { width: 100%; max-width: 1400px; margin: auto; padding: 10px; box-sizing: border-box; }
        .top-panels { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 10px; margin-bottom: 10px; }
        .panel { background: white; border-radius: 4px; color: var(--text-dark); display: flex; flex-direction: column; overflow: hidden; }
        .panel-header { background: var(--bg-blue); color: white; padding: 10px; font-size: 13px; font-weight: bold; font-style: italic; display: flex; justify-content: space-between; align-items: center; }
        .panel-body { padding: 12px; flex: 1; }
        label { display: block; font-size: 9px; font-weight: bold; color: #666; margin-top: 8px; text-transform: uppercase; }
        select, input { width: 100%; padding: 8px; font-size: 13px; border: 1px solid #ccc; border-radius: 3px; margin-top: 4px; box-sizing: border-box; }
        .size-input { background: #eee; border: none; font-size: 22px; font-weight: bold; text-align: center; padding: 10px; border-radius: 4px; color: var(--text-dark); width: 45%; }
        .info-box { background: #e3f2fd; border: 1px solid #bbdefb; padding: 10px; border-radius: 4px; margin-top: 10px; color: #0d47a1; font-size: 12px; }
        .bottom-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 10px; background: #d1d1d1; padding: 10px; margin-top: 10px; border-radius: 4px; color: black; }
        .ref-card { background: #e9e9e9; border: 1px solid #999; padding: 10px; font-size: 11px; }
        .footer-floating { position: fixed; bottom: 0; left: 0; width: 100%; background: #2c3e50; padding: 15px; display: flex; justify-content: space-around; align-items: center; flex-wrap: wrap; gap: 10px; z-index: 9999; border-top: 4px solid var(--green-success); box-sizing: border-box; }
        .final-price-value { font-size: clamp(32px, 10vw, 48px); font-weight: bold; color: #4ade80; text-shadow: 1px 1px 2px black; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .btn-action { border: none; padding: 12px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 8px; min-width: 140px; justify-content: center; color: white; transition: 0.2s; }
        .btn-sync { background: var(--sync-orange); }
        .btn-pdf { background: var(--pdf-red); }
        .btn-whatsapp { background: var(--green-success); }
        .btn-limpar { background: var(--red-delete); padding: 4px 8px; font-size: 10px; }
        .btn-add { background: var(--bg-blue); color: white; border: none; padding: 2px 5px; border-radius: 3px; cursor: pointer; font-size: 10px; }
        .btn-del { color: var(--red-delete); cursor: pointer; font-size: 11px; margin-left: 5px; }
        .resumo-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .resumo-table td { padding: 4px 0; border-bottom: 1px dotted #999; }
        .val { text-align: right; font-weight: bold; }
        @media (max-width: 600px) { .btn-action { width: 100%; } }
    </style>
</head>
<body>

<div class="main-container">
    <div class="top-panels">
        <div class="panel">
            <div class="panel-header"><span>1. CLIENTE E PEDIDO</span><button class="btn-limpar" onclick="novoOrcamento()">LIMPAR TELA</button></div>
            <div class="panel-body">
                <label>Cliente</label><input type="text" id="cliNome" oninput="saveAndCalc()">
                <label>WhatsApp / CNPJ</label><input type="text" id="cliDados" oninput="saveAndCalc()">
                <label>Produto</label><input list="prod-list" id="tipoServico" value="Blocos / Talonários" oninput="saveAndCalc()">
                <datalist id="prod-list"><option value="Blocos"><option value="Panfletos"><option value="Cartões"></datalist>
                <div style="display:flex; gap:5px">
                    <div style="flex:1"><label>Fls/Bloco</label><input type="number" id="qtdInterna" value="100" oninput="saveAndCalc()"></div>
                    <div style="flex:1"><label>Qtd Pedido</label><input type="number" id="qtdVenda" value="1" oninput="saveAndCalc()" style="border:2px solid var(--active-blue)"></div>
                </div>
                <label>Cores</label>
                <select id="esquemaCores" onchange="saveAndCalc()">
                    <option value="1">1x0 (PB Frente)</option><option value="4">4x0 (Colorido Frente)</option><option value="8">4x4 (Colorido F/V)</option>
                </select>
                <label>Tempo Produção (h)</label><input type="number" id="tempoProd" value="1" step="0.5" oninput="saveAndCalc()">
            </div>
        </div>
        <div class="panel">
            <div class="panel-header">2. TAMANHO E CORTE</div>
            <div class="panel-body">
                <div style="display:flex; justify-content:center; align-items:center; gap:10px; margin:10px 0;">
                    <input type="number" id="lar" class="size-input" value="41" oninput="saveAndCalc()">
                    <span style="color:black">X</span>
                    <input type="number" id="alt" class="size-input" value="28" oninput="saveAndCalc()">
                </div>
                <div class="info-box" id="resCorte">Aproveitamento: --</div>
                <div class="layout-container"><canvas id="canvasLayout" width="180" height="120"></canvas></div>
            </div>
        </div>
        <div class="panel">
            <div class="panel-header">3. PAPEL E TINTA</div>
            <div class="panel-body">
                <label>Tipo de Papel</label><select id="gramSelect" onchange="saveAndCalc()"></select>
                <label>Preço Resma</label><input type="number" id="pResma" readonly style="background:#f0f0f0">
                <label>Tinta KG</label><input type="number" id="pTintaExib" readonly style="background:#f0f0f0">
                <label>Gasto Tinta (g/1000)</label><input type="number" id="gastoTintaGramas" value="100" oninput="saveAndCalc()">
                <label>Folhas Resma</label><input type="number" id="qResma" value="500" oninput="saveAndCalc()">
            </div>
        </div>
        <div class="panel">
            <div class="panel-header">4. ACABAMENTOS</div>
            <div class="panel-body">
                <label>Adicionar</label><select id="selAcab" onchange="addAcab()"></select>
                <div id="listaAcab" style="margin-top:10px"></div>
                <table class="price-table">
                    <thead><tr><th>QTD</th><th>UNIT.</th><th>TOTAL</th></tr></thead>
                    <tbody id="tabelaOrcamento"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="bottom-section">
        <div class="ref-card">
            <h4>Custos Fixos <button class="btn-add" onclick="addItem('fixos')">+</button></h4>
            <div id="containerFixos">
                <label>Pró-labore M</label><input type="number" id="proMarcilio" value="5000" oninput="saveAndCalc()">
                <label>Pró-labore C</label><input type="number" id="proCristiane" value="2000" oninput="saveAndCalc()">
                <label>Contas Fixas</label><input type="number" id="contasFixas" value="1000" oninput="saveAndCalc()">
                <div style="display:flex; gap:5px"><input type="number" id="diasUteis" value="22" oninput="saveAndCalc()"><input type="number" id="horasDia" value="7" oninput="saveAndCalc()"></div>
            </div>
            <div style="margin-top:5px; font-weight:bold">Hora: <span id="valHoraMaquina">R$ 0,00</span></div>
        </div>
        <div class="ref-card">
            <h4>Setup <button class="btn-add" onclick="addItem('setup')">+</button></h4>
            <div id="containerSetup">
                <label>Chapa (un)</label><input type="number" id="baseChapa" value="45" oninput="saveAndCalc()">
                <label>Tinta (kg)</label><input type="number" id="baseTinta" value="100" oninput="saveAndCalc()">
                <label>Setup Fixo</label><input type="number" id="baseSetup" value="40" oninput="saveAndCalc()">
            </div>
        </div>
        <div class="ref-card">
            <h4>Papéis <button class="btn-add" onclick="addItem('papel')">+</button></h4>
            <table class="ref-table"><tbody id="tbodyPapel">
                <tr data-gram="Sulfit 56g"><td>56g</td><td><input type="number" value="180"></td><td><input type="number" value="200"></td></tr>
            </tbody></table>
        </div>
        <div class="ref-card">
            <h4>Acabamentos <button class="btn-add" onclick="addItem('acabamento')">+</button></h4>
            <table class="ref-table"><tbody id="tbodyAcab">
                <tr data-serv="Refile"><td>Refile</td><td><input type="number" value="10"></td><td><input type="number" value="40"></td></tr>
            </tbody></table>
        </div>
        <div class="ref-card" style="background:#fff; border-left:5px solid var(--active-blue);">
            <h4>Resumo</h4>
            <table class="resumo-table" id="tabelaResumoCustos"></table>
            <label>LUCRO %</label><input type="number" id="lucroPorcent" value="30" oninput="saveAndCalc()" style="font-weight:bold; color:var(--bg-blue)">
        </div>
    </div>
</div>

<div class="footer-floating">
    <div class="final-price-value" id="totalPrice">R$ 0,00</div>
    <div class="btn-group">
        <button class="btn-action btn-sync" id="btnSync" onclick="sincronizarPrecos()"><i class="fa fa-sync"></i> ATUALIZAR</button>
        <button class="btn-action btn-pdf" onclick="gerarPDF()"><i class="fa fa-file-pdf"></i> PDF</button>
        <button class="btn-action btn-whatsapp" id="btnWhats" onclick="enviarWhatsApp()"><i class="fab fa-whatsapp"></i> WHATSAPP</button>
    </div>
</div>

<script>
    let acabamentosAtivos = [];
    const URL_GOOGLE = "https://script.google.com/macros/s/AKfycbyPKB2h-GL7u6U1gZnHfH5whcuF78aH7x5q1imR94Ny_MuNgAJCSRhbosxzskt8j3BI/exec";

    const camposBackup = ['cliNome', 'cliDados', 'tipoServico', 'qtdInterna', 'qtdVenda', 'esquemaCores', 'lar', 'alt', 'lucroPorcent', 'tempoProd', 'proMarcilio', 'proCristiane', 'contasFixas', 'diasUteis', 'horasDia', 'baseChapa', 'baseTinta', 'baseSetup'];

    function saveAndCalc() {
        const dados = {}; camposBackup.forEach(id => { 
            const el = document.getElementById(id);
            if(el) dados[id] = el.value; 
        });
        localStorage.setItem('mc_v17_save', JSON.stringify(dados));
        calc();
    }

    function loadBackup() {
        const salvo = localStorage.getItem('mc_v17_save');
        if (salvo) { 
            const d = JSON.parse(salvo); 
            camposBackup.forEach(id => { if(d[id] && document.getElementById(id)) document.getElementById(id).value = d[id]; }); 
        }
    }

    function novoOrcamento() { if(confirm("Deseja limpar todos os dados da tela?")) { localStorage.removeItem('mc_v17_save'); location.reload(); } }

    async function sincronizarPrecos() {
        const btn = document.getElementById('btnSync'); btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i>'; btn.disabled = true;
        try {
            const resp = await fetch(URL_GOOGLE); 
            const data = await resp.json();
            const tbP = document.getElementById('tbodyPapel'); tbP.innerHTML = "";
            data.papeis.forEach(p => {
                const gn = p.gram.match(/\d+/)[0];
                tbP.insertAdjacentHTML('beforeend', `<tr data-gram="${p.gram}"><td>${p.gram}</td><td><input type="number" id="p${gn}_64" value="${p.p64}" oninput="saveAndCalc()"></td><td><input type="number" id="p${gn}_66" value="${p.p66}" oninput="saveAndCalc()"></td><td><i class="fa fa-trash btn-del" onclick="removeRow(this)"></i></td></tr>`);
            });
            const tbA = document.getElementById('tbodyAcab'); tbA.innerHTML = "";
            data.acabamentos.forEach(a => {
                const id = a.serv.replace(/\s/g, '').replace(/[éêè]/g,'e').replace(/ç/g,'c');
                tbA.insertAdjacentHTML('beforeend', `<tr data-serv="${a.serv}"><td>${a.serv}</td><td><input type="number" id="base_${id}" value="${a.base}" oninput="saveAndCalc()"></td><td><input type="number" id="preMil_${id}" value="${a.mil}" oninput="saveAndCalc()"></td><td><i class="fa fa-trash btn-del" onclick="removeRow(this)"></i></td></tr>`);
            });
            alert("Sucesso! Preços da planilha carregados."); saveAndCalc();
        } catch(e) { alert("Erro ao sincronizar. Verifique a internet e a planilha."); }
        finally { btn.innerHTML = '<i class="fa fa-sync"></i> ATUALIZAR'; btn.disabled = false; }
    }

    async function enviarWhatsApp() {
        const cli = document.getElementById('cliNome').value || "Cliente", prod = document.getElementById('tipoServico').value;
        const qv = document.getElementById('qtdVenda').value, total = document.getElementById('totalPrice').innerText;
        const btn = document.getElementById('btnWhats'); btn.innerHTML = '<i class="fa fa-cloud-upload-alt"></i> A GUARDAR...';
        
        try {
            // Guarda na aba "Historico" da sua planilha do Google
            fetch(URL_GOOGLE, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ cliente: cli, produto: prod, quantidade: qv, total: total }) });
        } catch(e) { console.error("Erro ao guardar histórico"); }
        finally { btn.innerHTML = '<i class="fab fa-whatsapp"></i> WHATSAPP'; }

        const qInt = document.getElementById('qtdInterna').value;
        let sug = ""; document.querySelectorAll('#tabelaOrcamento tr').forEach(tr => {
            const cols = tr.querySelectorAll('td'); sug += `* ${cols[0].innerText} un (${qInt} fls) — Total: R$ ${cols[2].innerText}\n`;
        });
        const msg = encodeURIComponent(`- ORÇAMENTO MC SERIGRAFIA -\nSUGESTÕES:\n${sug}--------------------------\nCLIENTE: ${cli}\nPRODUTO: ${prod}\nTOTAL: ${total}\nPix cnpj 46.897.470.0001-09`);
        window.open(`https://wa.me/5551999713739?text=${msg}`);
    }

    function syncDropdowns() {
        const gs = document.getElementById('gramSelect'), sa = document.getElementById('selAcab'), gv = gs.value;
        if(!gs || !sa) return;
        gs.innerHTML = ""; document.querySelectorAll('#tbodyPapel tr').forEach(tr => { let g = tr.dataset.gram; gs.innerHTML += `<option value="${g}">${g}</option>`; }); gs.value = gv;
        sa.innerHTML = '<option value="">-- Selecione --</option>'; document.querySelectorAll('#tbodyAcab tr').forEach(tr => { let s = tr.dataset.serv; sa.innerHTML += `<option value="${s}">${s}</option>`; });
    }

    function calc() {
        syncDropdowns();
        let tf = 0; ['proMarcilio', 'proCristiane', 'contasFixas'].forEach(id => tf += parseFloat(document.getElementById(id).value) || 0);
        const hm = tf / ((parseFloat(document.getElementById('diasUteis').value) || 1) * (parseFloat(document.getElementById('horasDia').value) || 1));
        document.getElementById('valHoraMaquina').innerText = hm.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
        const qv = Math.max(1, parseInt(document.getElementById('qtdVenda').value) || 1), qInt = parseInt(document.getElementById('qtdInterna').value) || 1;
        const tp = parseFloat(document.getElementById('tempoProd').value) || 0, l = parseFloat(document.getElementById('lar').value) || 1, a = parseFloat(document.getElementById('alt').value) || 1;
        const gramFull = document.getElementById('gramSelect').value || "Sulfit 56g", qr = parseFloat(document.getElementById('qResma').value) || 500, luc = (parseFloat(document.getElementById('lucroPorcent').value) || 0) / 100 + 1, gramNum = gramFull.match(/\d+/)?.[0] || "56";
        const formats = [{n:"64x88", w:64, h:88}, {n:"66x96", w:66, h:96}];
        let mf = formats[0], map = 0, ml = l, ma = a;
        formats.forEach(f => {
            let ap1 = Math.floor(f.w/l)*Math.floor(f.h/a), ap2 = Math.floor(f.w/a)*Math.floor(f.h/l);
            if(Math.max(ap1, ap2) > map) { map = Math.max(ap1, ap2); mf = f; if(ap2 > ap1) { ml = a; ma = l; } else { ml = l; ma = a; } }
        });
        const pr = Math.max(0, parseFloat(document.getElementById(`p${gramNum}_${mf.n==="64x88"?"64":"66"}`)?.value)||0);
        document.getElementById('pResma').value = pr; 
        const setupFixo = parseFloat(document.getElementById('baseSetup').value) || 0;
        let scales = [1, 5, 10, 20, 50, 100]; if(!scales.includes(qv)) { scales.push(qv); scales.sort((a,b)=>a-b); }
        let resHtml = "";
        scales.forEach(q => {
            const tpec = q * qInt, fc = Math.ceil((tpec/map)*1.1) || 0, cpap = (pr/qr)*fc, nc = parseInt(document.getElementById('esquemaCores').value), ccha = nc * (parseFloat(document.getElementById('baseChapa').value) || 0);
            let cacab = acabamentosAtivos.reduce((acc,ac) => {
                let sA = ac.replace(/\s/g, '').replace(/[éê]/g,'e').replace(/ç/g,'c');
                let iB = document.getElementById(`base_${sA}`), iM = document.getElementById(`preMil_${sA}`);
                return acc + (iB ? parseFloat(iB.value) || 0 : 0) * q + ((iM ? parseFloat(iM.value) || 0 : 0) / 1000) * q;
            }, 0);
            const cProd = ccha + cpap + cacab + (hm * tp) + setupFixo, final = cProd * luc;
            if(q === qv) {
                document.getElementById('totalPrice').innerText = final.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
                document.getElementById('tabelaResumoCustos').innerHTML = `<tr><td>Papel (${fc} fls)</td><td class="val">R$ ${cpap.toFixed(2)}</td></tr><tr><td>Chapas (${nc} un)</td><td class="val">R$ ${ccha.toFixed(2)}</td></tr><tr style="color:var(--bg-blue); font-weight:bold;"><td>Total Custo</td><td class="val">R$ ${cProd.toFixed(2)}</td></tr>`;
            }
            resHtml += `<tr ${q===qv?'style="background:#d1e7ff;font-weight:bold"':''}><td>${q}</td><td>${(final/q).toFixed(2)}</td><td>${final.toFixed(2)}</td></tr>`;
        });
        document.getElementById('tabelaOrcamento').innerHTML = resHtml;
        const cv = document.getElementById('canvasLayout'), ct = cv.getContext('2d');
        ct.clearRect(0,0,180,120); const s = Math.min(170/mf.w, 110/mf.h);
        ct.strokeStyle="#ccc"; ct.strokeRect(5,5,mf.w*s,mf.h*s); ct.fillStyle="#ff5252";
        for(let i=0; i<Math.floor(mf.w/ml); i++) for(let j=0; j<Math.floor(mf.h/ma); j++) ct.fillRect(5+(i*ml*s), 5+(j*ma*s), (ml*s)-1, (ma*s)-1);
        document.getElementById('resCorte').innerHTML = `Aproveitamento: <b>${map} pçs/fl</b> | <b>${mf.n}</b>`;
    }

    function gerarPDF() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        const cli = document.getElementById('cliNome').value || "Cliente", total = document.getElementById('totalPrice').innerText;
        doc.setFillColor(0, 90, 171); doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255, 255, 255); doc.setFontSize(22); doc.text("MC SERIGRAFIA E GRÁFICA", 10, 25);
        doc.setTextColor(0,0,0); doc.setFontSize(12); doc.text(`Cliente: ${cli}`, 10, 55);
        doc.text("Este é um orçamento preliminar.", 10, 70);
        doc.text(`Valor Total: ${total}`, 10, 85);
        doc.save(`Orcamento_MC_${cli}.pdf`);
    }

    function addAcab() { let v = document.getElementById('selAcab').value; if(v && !acabamentosAtivos.includes(v)) { acabamentosAtivos.push(v); renderAcab(); saveAndCalc(); } document.getElementById('selAcab').value = ""; }
    function renderAcab() { document.getElementById('listaAcab').innerHTML = acabamentosAtivos.map(a => `<div style="color:black; padding:5px; background:#f0f0f0; margin-top:5px; display:flex; justify-content:space-between"><span>${a}</span><i class="fa fa-trash" onclick="acabamentosAtivos.splice(acabamentosAtivos.indexOf('${a}'),1);renderAcab();saveAndCalc();" style="cursor:pointer"></i></div>`).join(''); }
    function removeRow(btn) { btn.closest('tr').remove(); syncDropdowns(); saveAndCalc(); }
    function addItem(type) {
        const name = prompt("Nome do novo item:"); if(!name) return;
        if(type==='papel') document.getElementById('tbodyPapel').insertAdjacentHTML('beforeend', `<tr data-gram="${name}"><td>${name}</td><td><input type="number" value="0"></td><td><input type="number" value="0"></td><td><i class="fa fa-trash btn-del" onclick="removeRow(this)"></i></td></tr>`);
        else if(type==='acabamento') document.getElementById('tbodyAcab').insertAdjacentHTML('beforeend', `<tr data-serv="${name}"><td>${name}</td><td><input type="number" id="base_${name.replace(/\s/g,'')}" value="0"></td><td><input type="number" id="preMil_${name.replace(/\s/g,'')}" value="0"></td><td><i class="fa fa-trash btn-del" onclick="removeRow(this)"></i></td></tr>`);
        syncDropdowns(); saveAndCalc();
    }

    window.onload = () => { loadBackup(); calc(); };
</script>
</body>
</html>
